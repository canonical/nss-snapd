summary: valid SNAP_USER resolves synthetic passwd and group entries
details: |
  This test validates the main happy path where SNAP_USER supplies a valid
  uid:name pair and the module synthesizes passwd and group entries with the
  expected ids and fields for both name and numeric-id lookups.
execute: |
  set -eu

  export SNAP_USER="4242:snapd-synthetic"
  export SNAP_REAL_HOME="/home/snapd-synthetic"
  export SHELL="/bin/bash"

  getent passwd snapd-synthetic | MATCH '^snapd-synthetic:x:4242:4242::/home/snapd-synthetic:/bin/bash$'
  getent passwd 4242 | MATCH '^snapd-synthetic:x:4242:4242::/home/snapd-synthetic:/bin/bash$'
  getent group snapd-synthetic | MATCH '^snapd-synthetic:x:4242:$'
  getent group 4242 | MATCH '^snapd-synthetic:x:4242:$'
