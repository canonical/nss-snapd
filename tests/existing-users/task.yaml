summary: existing passwd users resolve via files
details: |
  This test verifies that enabling the nss-snapd module does not break standard
  passwd resolution for users that already exist in /etc/passwd, such as root
  and ubuntu. It confirms the files provider continues to work in the chain.
execute: |
  set -eu

  getent passwd root | MATCH '^root:'
  getent passwd ubuntu | MATCH '^ubuntu:'
