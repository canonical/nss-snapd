summary: existing passwd users and groups resolve via files
details: |
  This test verifies that enabling the nss-snapd module does not break standard
  passwd/group resolution for identities that already exist in system databases,
  such as root and ubuntu. It confirms the files provider continues to work in
  the chain.
execute: |
  set -eu

  getent passwd root | MATCH '^root:'
  getent passwd ubuntu | MATCH '^ubuntu:'
  getent group root | MATCH '^root:'
