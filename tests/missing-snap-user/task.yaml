summary: non-matching SNAP_USER does not resolve arbitrary users or groups
details: |
  This test ensures the NSS module returns NOTFOUND semantics when SNAP_USER is
  unset or does not match the queried account name/group. It protects against
  accidental synthesis of unrelated identities and validates safe chain fallback.
execute: |
  set -eu

  target_user="snapd-missing-user"
  target_group="snapd-missing-user"

  unset SNAP_USER
  output="$(getent passwd "$target_user" || true)"
  printf '%s\n' "$output" | NOMATCH "^${target_user}:"
  output="$(getent group "$target_group" || true)"
  printf '%s\n' "$output" | NOMATCH "^${target_group}:"

  export SNAP_USER="4242:snapd-synthetic"
  output="$(getent passwd "$target_user" || true)"
  printf '%s\n' "$output" | NOMATCH "^${target_user}:"
  output="$(getent group "$target_group" || true)"
  printf '%s\n' "$output" | NOMATCH "^${target_group}:"
